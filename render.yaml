# Render Blueprint — backend API
# Dashboard: New → Blueprint → conectar repo → aplicar este archivo
services:
  - type: web
    name: control-de-stock-back
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://control-de-stock-smoky.vercel.app
      - key: CORS_ORIGINS
        value: https://control-de-stock-smoky.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: 2
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Alternativa SMTP (puede colgarse en Render): EMAIL_PROVIDER=smtp + SMTP_*
